{{- /* Custom head content - side ToC styling */ -}}
<style>
    /* Side ToC for wide screens */
    @media (min-width: 1280px) {
        .post-single {
            position: relative;
        }

        .toc {
            position: fixed;
            top: 100px;
            left: max(10px, calc((100vw - var(--main-width)) / 2 - 280px));
            width: 250px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            margin-bottom: 0;
            font-size: 0.85rem;
            z-index: 10;
        }

        .toc .inner {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
        }
    }

    /* Pill-style tags */
    .post-tags a {
        border-radius: 50px;
        padding: 2px 20px;
        font-size: 10px;
        height: 40px;
        transition:
            background 0.2s ease,
            color 0.2s ease;
    }

    :root {
        --accent: #2ab458;
        --accent-hover: #068822;
    }

    /* Links */
    .post-content a,
    .toc a,
    .breadcrumbs a,
    .post-meta a,
    .footer a,
    .paginav a:hover span:not(.title) {
        color: var(--accent);
    }

    .post-content a:hover,
    .toc a:hover,
    .breadcrumbs a:hover {
        color: var(--accent-hover);
    }

    /* Link underlines */
    .post-content a,
    .toc a:hover {
        box-shadow: 0 1px 0 var(--accent);
    }

    /* Blockquote accent border */
    .post-content blockquote {
        border-inline-start-color: var(--accent);
    }

    /* Tag pills hover */
    .post-tags a:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
    }

    /* Active/hover nav & buttons */
    .top-link:hover {
        background: var(--accent);
        color: #fff;
    }

    /* Menu active item */
    .menu a.active {
        color: var(--accent);
    }
</style>
